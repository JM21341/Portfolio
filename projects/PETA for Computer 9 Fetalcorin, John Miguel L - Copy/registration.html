<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="author" content="JM Fetalcorin">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register | Coffee Mania</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body id="registration">
    <header>
      <div class="container">
        <div id="headerTitle">
          <h1>Coffee Mania</h1>
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="abouts.html">About Us</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="registration.html">Register</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <section id="registerContent">
      <div class="container">
        <div id="formDiv">
          <h2>Register Now!</h2>
          <form id="registrationForm" action="index.html" method="post">
            <div class="centerDiv">
              <label for="fname">First Name:</label>
              <input id="fname" type="text" name="fname" placeholder="First Name...">
              <label for="lname">Surname:</label>
              <input id="lname" type="text" name="lname" placeholder="Surname...">
              <label for="midname">Middle Name:</label>
              <input id="midname" type="text" name="midname" placeholder="Middle Name...">
              <label for="email">Email:</label>
              <input id="email" type="email" name="email" placeholder="youremail@gmail.com">
              <label for="pass">Password:</label>
              <input id="pass" type="password" name="personPass" placeholder="Password...">
              <div class="centerDiv">
                <button id="formSubmitBtn" type="submit" name="button">
                  <a href="submitNav">Submit!</a>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
  <script src="otpProductBought.js"></script>
</html>
